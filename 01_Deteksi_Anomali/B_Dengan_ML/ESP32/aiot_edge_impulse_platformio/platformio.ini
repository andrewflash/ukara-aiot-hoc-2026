[platformio]
default_envs = esp32dev_collect

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
; Link the large Edge Impulse SDK via a response file (avoids
; "Argument list too long" at the final link step).
extra_scripts = post:scripts/use_response_file.py
lib_deps =
  adafruit/Adafruit MPU6050@^2.2.6
  adafruit/Adafruit Unified Sensor@^1.1.15
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -D SAMPLE_RATE_HZ=50
  -D SERIAL_BAUD=115200

[env:esp32dev_collect]
extends = common
board = esp32dev
build_src_filter = +<collect_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"ESP32_DEVKIT_V1\"
  -D I2C_SDA_PIN=21
  -D I2C_SCL_PIN=22

[env:esp32dev_infer]
extends = common
board = esp32dev
build_src_filter = +<infer_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"ESP32_DEVKIT_V1\"
  -D I2C_SDA_PIN=21
  -D I2C_SCL_PIN=22

[env:esp32c3_collect]
extends = common
board = esp32-c3-devkitm-1
build_src_filter = +<collect_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"ESP32_C3_SUPER_MINI\"
  -D I2C_SDA_PIN=4
  -D I2C_SCL_PIN=5
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:esp32c3_infer]
extends = common
board = esp32-c3-devkitm-1
build_src_filter = +<infer_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"ESP32_C3_SUPER_MINI\"
  -D I2C_SDA_PIN=4
  -D I2C_SCL_PIN=5
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:xiao_esp32s3_collect]
extends = common
board = seeed_xiao_esp32s3
build_src_filter = +<collect_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"SEEED_XIAO_ESP32S3\"
  -D I2C_SDA_PIN=5
  -D I2C_SCL_PIN=6
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:xiao_esp32s3_infer]
extends = common
board = seeed_xiao_esp32s3
build_src_filter = +<infer_main.cpp> +<common/>
build_flags =
  ${common.build_flags}
  -D BOARD_NAME=\"SEEED_XIAO_ESP32S3\"
  -D I2C_SDA_PIN=5
  -D I2C_SCL_PIN=6
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
